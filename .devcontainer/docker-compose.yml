---
services:
  homeassistant:
    container_name: wifi-ssid-monitor-dev
    image: ha-dev-base:latest
    volumes:
      # Mount the whole project so the DevContainer workspace works
      - ..:/workspaces/ha-wifi-ssid-monitor
      # Mount your local dev config
      - ./.devconfig:/config
      # IMPORTANT: Use a relative path from the
      #  project root inside the container
      # This ensures HA sees your code as an integration
      - ../custom_components/wifi_ssid_monitor:/config/custom_components/wifi_ssid_monitor:ro
      # Project notes and shared files
      - C:/Local/Code/github/PlayFaster/home-assistant/shared/ProjNotes/Notes-ha-huawei-router-5g-monitor:/workspaces/ha-huawei-router-5g-monitor/.notes
      - C:/Local/Code/github/PlayFaster/home-assistant/shared/SharedNotes:/workspaces/ha-huawei-router-5g-monitor/.shared
      # HA core source — read-only, used by mypy for type resolution
      - C:/Local/Code/ha_core/core:/ha_core:ro
      # Docker Outside Docker (DooD) — allows running docker commands from inside
      # the container by delegating to the host Docker daemon.
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8123:8123"
    restart: unless-stopped
    environment:
      - TZ=Europe/London
      - SUPERVISOR_TOKEN=mock_dev_token
    depends_on:
      - supervisor

  # Mock service to simulate Supervisor API as host will not pass thru WiFi
  supervisor:
    image: python:3.11-slim
    container_name: supervisor_mock
    volumes:
      - ./mock_supervisor.py:/mock_supervisor.py:ro
    command: python /mock_supervisor.py
