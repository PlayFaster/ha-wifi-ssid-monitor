---
name: CodeQL

"on":
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 6 * * 1" # Weekly Monday 06:00 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  codeql:
    permissions:
      contents: read
      security-events: write # Required to upload CodeQL SARIF results to GitHub Security
    # Branch @main — replace SHA after releasing .github repo with codeql.yaml
    uses: PlayFaster/.github/.github/workflows/codeql.yaml@450a90fd9ecb56485b90754f061ce4a4e4c0e7dc
