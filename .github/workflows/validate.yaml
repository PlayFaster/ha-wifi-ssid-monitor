---
name: Validate

"on":
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *" # Daily at midnight

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    # Branch @main v2.0.3 — update SHA after pushing .github changes
    uses: PlayFaster/.github/.github/workflows/validate.yaml@450a90fd9ecb56485b90754f061ce4a4e4c0e7dc
    with:
      category: integration
      component_name: wifi_ssid_monitor
      gist_id: 6d1d30e996dd53f04d2c2fc6b6cddece
    secrets:
      GIST_SECRET: ${{ secrets.GIST_SECRET }}
