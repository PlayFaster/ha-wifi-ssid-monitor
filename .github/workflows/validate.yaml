---
name: Validate

"on":
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *" # Daily at midnight

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  validate:
    permissions: {}
    # Branch @main
    uses: PlayFaster/.github/.github/workflows/validate.yaml@fe69810b26110613d45081549282594c31dc8249
    with:
      component_name: wifi_ssid_monitor
      gist_id: 6d1d30e996dd53f04d2c2fc6b6cddece
    secrets:
      GIST_SECRET: ${{ secrets.GIST_SECRET }}
