---
# Workflow runs a suite of validations for the Home Assistant integration.
# It contains multiple independent jobs (Hassfest, HACS, Ruff, etc.),
# it generates a SINGLE workflow badge for the README.

name: Validate

"on":
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *" # Daily at midnight

env:
  COMPONENT_PATH: custom_components/wifi_ssid_monitor

permissions:
  contents: write # Required for updating the coverage badge in README
  pull-requests: write # For creating/updating PR comments

jobs:
  # Job 1: Official Home Assistant HASSfest validation.
  hassfest:
    name: "HA Hassfest"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Hassfest Validation
        uses: home-assistant/actions/hassfest@master

  # Job 2: Official HACS metadata validation.
  hacs_val:
    name: "HACS Check"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: HACS Validation
        uses: hacs/action@main
        with:
          category: integration

  # Job 3: Python quality check via Ruff.
  py_val:
    name: "Python Lint (Ruff)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff Check
        run: ruff check .

      - name: Run Ruff Format
        run: ruff format --check .

  # Job 4: Pytest and Dynamic Coverage Badge.
  # Runs all unit tests and updates the README badge automatically.
  test_val:
    name: "Tests & Coverage"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r .validate/requirements_test.txt
          pip install .

      - name: Run tests
        run: |
          pytest --cov=${{ env.COMPONENT_PATH }} \
            --cov-report=xml \
            --cov-report=term-missing \
            --junitxml=pytest.xml \
            tests/

      - name: Pytest coverage comment
        id: coverageComment # Added ID to access the badge output
        uses: MishaKav/pytest-coverage-comment@main
        with:
          pytest-xml-coverage-path: ./coverage.xml
          title: Coverage Report
          badge-title: Coverage
          hide-badge: false
          hide-comment: false
          create-new-comment: false
          junitxml-path: ./pytest.xml

      - name: Extract Coverage Percentage
        id: extract_cov
        shell: bash
        run: |
          # This pulls the TOTAL percentage from the coverage report
          # and saves it as an environment variable
          COVERAGE=$(coverage report | grep TOTAL | awk '{print $NF}' | tr -d '%')
          echo "PERCENTAGE=$COVERAGE" >> $GITHUB_OUTPUT

      - name: Update Coverage Badge Gist
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: 6d1d30e996dd53f04d2c2fc6b6cddece
          filename: coverage.json
          label: Coverage
          message: ${{ steps.extract_cov.outputs.PERCENTAGE }}%
          valColorRange: ${{ steps.extract_cov.outputs.PERCENTAGE }}
          maxColorRange: 100
          minColorRange: 0

  # Job 5: File-level integrity (JSON, YAML, Markdown, Prettier, and HA manifest schema).
  file_val:
    name: "File Integrity"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: HACS Schema Check
        run: |
          pip install check-jsonschema
          check-jsonschema --schemafile .validate/hacs_schema.json hacs.json

      - name: HA Manifest Schema Check
        run: |
          check-jsonschema \
            --schemafile .validate/ha_manifest_schema.json \
            ${{ env.COMPONENT_PATH }}/manifest.json

      - name: YAML Check
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: .
          config_data: "{extends: relaxed, rules: {line-length: {max: 120}}}"

      - name: Prettier Format Check
        run: |
          npm install -g prettier@3.6.2 prettier-plugin-sort-json@4.2.0
          export NODE_PATH=$(npm root -g)
          ln -s "$(npm root -g)" /node_modules || true
          prettier --config .validate/.prettierrc.js --check "**/*.{md,json,yaml,yml}"

      - name: Check README Links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          base-branch: main
          file-path: README.md

  # Job 6: Spell checking.
  codespell:
    name: "Codespell"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run Codespell
        uses: codespell-project/actions-codespell@v2

  # Job 7: GitHub Actions workflow security audit.
  # Known findings exist — step is non-blocking until resolved.
  zizmor:
    name: "Zizmor (Workflow Security)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Zizmor
        run: pip install zizmor==1.24.1

      - name: Run Zizmor
        continue-on-error: true
        run: zizmor --pedantic .github/

  # Job 8: Python type checking.
  # Annotation work outstanding — step is non-blocking until resolved.
  mypy_val:
    name: "Python Types (Mypy)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          pip install mypy
          pip install -r .validate/requirements_test.txt

      - name: Run Mypy
        continue-on-error: true
        run: mypy custom_components/
