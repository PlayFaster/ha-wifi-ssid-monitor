[tool.ruff]
# Target the version used in your devcontainer
target-version = "py314"
line-length = 88

[tool.ruff.lint]
#    "B",   # flake8-bugbear
#    "E",   # pycodestyle error
#    "F",   # Pyflakes
#    "I",   # isort
#    "UP",  # pyupgrade
#    "W",   # pycodestyle warning
#    "N",   # pep8-naming
#    "D",   # pydocstyle
#    "ASYNC", # flake8-async
#    "RUF", # Ruff-specific rules
#    "HASS", # Home Assistant specific rules (HASSFEST)
#    "SIM", # flake8-simplify
#    "T20", # flake8-print (forbids print statements)

# select = ["B", "E", "F", "I", "UP", "W"] # basic

select = [
    "B",   # flake8-bugbear
    "E",   # pycodestyle error
    "F",   # Pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "W",   # pycodestyle warning
    "N",   # pep8-naming
    "D",   # pydocstyle
    "ASYNC", # flake8-async
    "RUF", # Ruff-specific rules
    "SIM", # flake8-simplify
    "T20", # flake8-print (forbids print statements)
]

# N D and T20 were omitted added back for full compliance.

ignore = [
    "D203", # Conflict with D211 (HA prefers no blank line before class)
    "D213", # Conflict with D212 (HA prefers summary on first line)
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
norecursedirs = [".git", "testing_config"]
markers = [
    "asyncio: mark test as an asyncio test",
]
filterwarnings = [
    "ignore::DeprecationWarning:homeassistant.components.http.*",
    "ignore::pytest.PytestUnraisableExceptionWarning",
]

[tool.mypy]
python_version = "3.14"
explicit_package_bases = true
show_error_codes = true
ignore_missing_imports = true
warn_unused_configs = true
disallow_untyped_defs = true
check_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true
strict_equality = true

[tool.coverage.run]
source = ["custom_components"]

[tool.coverage.report]
exclude_lines = [
  "pragma: no cover",
  "if TYPE_CHECKING:",
  "@overload",
]

[tool.codespell]
skip = ".git,.venv,.ruff_cache,.pytest_cache"
ignore-words-list = "hass"