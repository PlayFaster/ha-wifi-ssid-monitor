add_ssid:
  name: Add SSID
  description: >
    Adds an SSID or pattern to the known or denylist for one or all integration entries.
    Triggers an immediate re-scan.
  fields:
    ssid:
      name: SSID
      description: The network name (SSID) or wildcard pattern to add.
      required: true
      example: "MyHomeNetwork"
      selector:
        text:
    target:
      name: List
      description: Which list to add to.
      required: true
      default: known
      selector:
        select:
          options:
            - value: known
              label: Known SSIDs
            - value: denylist
              label: Always-Unknown (denylist)
    config_entry_id:
      name: Config Entry ID
      description: Target a specific entry by ID. Leave blank for all entries.
      required: false
      example: "abc123def456"
      selector:
        config_entry:
          integration: wifi_ssid_monitor

remove_ssid:
  name: Remove SSID
  description: >
    Removes an SSID or pattern from the known or denylist for one or all integration
    entries. Succeeds silently if it is not present. Triggers a re-scan when the list
    changes.
  fields:
    ssid:
      name: SSID
      description: >
        The exact SSID or pattern to remove — must match a list entry exactly; wildcards
        are not expanded.
      required: true
      example: "MyHomeNetwork"
      selector:
        text:
    target:
      name: List
      description: Which list to remove from.
      required: true
      default: known
      selector:
        select:
          options:
            - value: known
              label: Known SSIDs
            - value: denylist
              label: Always-Unknown (denylist)
    config_entry_id:
      name: Config Entry ID
      description: Target a specific entry by ID. Leave blank for all entries.
      required: false
      example: "abc123def456"
      selector:
        config_entry:
          integration: wifi_ssid_monitor

set_ssids:
  name: Set SSIDs
  description: >
    Replaces the entire known or denylist for one or all integration entries in one
    call. Returns old_entries and new_entries per affected entry for undo. Triggers an
    immediate re-scan.
  fields:
    values:
      name: SSIDs
      description: >
        The new comma-separated list of SSIDs and patterns. Replaces the target list
        entirely.
      required: true
      example: "Home-WiFi, Guest_*"
      selector:
        text:
    target:
      name: List
      description: Which list to replace.
      required: true
      default: known
      selector:
        select:
          options:
            - value: known
              label: Known SSIDs
            - value: denylist
              label: Always-Unknown (denylist)
    config_entry_id:
      name: Config Entry ID
      description: Target a specific entry by ID. Leave blank for all entries.
      required: false
      example: "abc123def456"
      selector:
        config_entry:
          integration: wifi_ssid_monitor

scan_now:
  name: Scan Now
  description: >
    Triggers an immediate WiFi scan for one or all integration entries, even while Pause
    Polling is on. Equivalent to pressing the Scan Now button.
  fields:
    config_entry_id:
      name: Config Entry ID
      description: Target a specific entry by ID. Leave blank for all entries.
      required: false
      example: "abc123def456"
      selector:
        config_entry:
          integration: wifi_ssid_monitor

clear_last_seen:
  name: Clear Last Seen History
  description: >
    Clears all persisted last-seen, first-seen, and visit-count history for one or all
    integration entries. History repopulates from the next scan.
  fields:
    config_entry_id:
      name: Config Entry ID
      description: Target a specific entry by ID. Leave blank for all entries.
      required: false
      example: "abc123def456"
      selector:
        config_entry:
          integration: wifi_ssid_monitor

get_networks:
  name: Get Networks
  description: >
    Returns the currently visible networks with their signal and history, filtered and
    sorted by signal. Reads live scan data directly, so it works even when the passive
    sensors are unavailable or their attribute list is capped.
  fields:
    scope:
      name: Scope
      description: Which networks to include.
      required: false
      default: unknown
      selector:
        select:
          options:
            - value: unknown
              label: Unknown only
            - value: known
              label: Known only
            - value: all
              label: All
    band:
      name: Band
      description: Restrict to a single band.
      required: false
      default: all
      selector:
        select:
          options:
            - value: "2.4"
              label: 2.4 GHz
            - value: "5"
              label: 5 GHz
            - value: "6"
              label: 6 GHz
            - value: all
              label: All
    min_signal:
      name: Minimum Signal
      description: Only include networks at or above this signal quality (0-100%).
      required: false
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"
          mode: box
    quantity:
      name: Quantity
      description: Maximum number of networks to return.
      required: false
      default: 50
      selector:
        number:
          min: 1
          max: 500
          mode: box
    keyword:
      name: Keyword
      description: Comma-separated terms; a network matching any is included.
      required: false
      selector:
        text:
    exclude:
      name: Exclude
      description: Comma-separated terms; a network matching any is dropped.
      required: false
      selector:
        text:
    config_entry_id:
      name: Config Entry ID
      description: Target a specific entry by ID. Leave blank for all entries.
      required: false
      example: "abc123def456"
      selector:
        config_entry:
          integration: wifi_ssid_monitor
